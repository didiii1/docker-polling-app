<!DOCTYPE html>
<html>
<head>
    <title>Voting</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 { color: #2c3e50; }
        form {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
        }
        label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
        }
        button {
            margin-top: 15px;
            padding: 10px 15px;
            background: #3498db;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #2980b9;
        }
        .flash {
            padding: 10px;
            background: #2ecc71;
            color: white;
            margin-bottom: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>{{ question.question_text }}</h1>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="flash">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">
    {% for option in options %}
        <label>
            <input type="radio" name="option" value="{{ option.id }}" required>
            {{ option.option_text }}
        </label>
    {% endfor %}
    
    <button type="submit">Kirim Vote</button>
</form>

<br>
<a href="{{ url_for('index') }}">⬅ Kembali ke Home</a>

</body>
</html>
