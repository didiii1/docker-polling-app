<!DOCTYPE html>
<html>
<head>
    <title>Hasil Voting</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 { color: #2c3e50; }

        .result {
            background: #f4f4f4;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
        }

        .bar {
            height: 20px;
            background: #3498db;
            border-radius: 5px;
            margin-top: 5px;
        }

        .percent {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

<h1>📊 Hasil: {{ question.question_text }}</h1>

{% for option in options %}
    {% set percentage = (option.votes / total_votes * 100) if total_votes > 0 else 0 %}
    
    <div class="result">
        <strong>{{ option.option_text }}</strong><br>
        {{ option.votes }} suara
        <div class="bar" style="width: {{ percentage }}%;"></div>
        <div class="percent">{{ "%.2f"|format(percentage) }}%</div>
    </div>
{% endfor %}

<p><strong>Total suara:</strong> {{ total_votes }}</p>

<br>
<a href="{{ url_for('index') }}">⬅ Kembali ke Home</a>

</body>
</html>
